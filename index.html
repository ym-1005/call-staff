<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:"Hiragino Mincho ProN",serif;
text-align:center;
background:#f8f4ec;
margin-top:0;
}

/* テキスト */
p{
font-size:40px;
font-weight:bold;
color:#333;
}

/* ベル */
#bell{
font-size:70px;
margin-top:40px;
}

/* ベル揺れアニメ */
@keyframes ring {
0% { transform: rotate(0); }
25% { transform: rotate(15deg); }
50% { transform: rotate(-15deg); }
75% { transform: rotate(10deg); }
100% { transform: rotate(0); }
}

.ring{
animation:ring 0.8s ease;
}

/* ボタン（ここが追加ポイント🔥） */
#callBtn{
margin-top:50px;
font-size:40px;        /* 文字大きく */
padding:30px 20px;    /* 上下めっちゃ広げる */
background:#7a0000;
color:#fff;
border:none;
border-radius:16px;
width:90%;            /* 横幅広げる */
max-width:400px;      /* 最大サイズUP */
}

/* 押した時 */
#callBtn:active{
transform:scale(0.95);
}

/* 無効状態 */
.disabled{
background:#aaa !important;
}

/* メッセージ */
#message{
margin-top:30px;
font-size:28px;
color:#7a0000;
display:none;
}

</style>

</head>

<body>

<div id="bell">🛎️</div>

<p>If you need assistance,<br>please press the call button below.</p>
<p>ご用の際は下の呼び出しボタンを押してください。</p>

<button id="callBtn" onclick="callStaff()">CALL STAFF</button>

<div id="message">
店員を呼びました<br>
Staff has been notified
</div>

<script>

let cooldown=false;

function callStaff(){

if(cooldown){
alert("Please wait a moment");
return;
}

cooldown=true;

let bell=document.getElementById("bell");
let btn=document.getElementById("callBtn");

bell.classList.add("ring");

setTimeout(function(){
bell.classList.remove("ring");
},800);

btn.classList.add("disabled");

fetch("https://discord.com/api/webhooks/1483017172405194833/aXLaqohfPlHPZpj5xs4YuxZVDuAIFQFYqMJtFdbIVtQuuCqoCkEz_owdKN5PEPB3-0QD",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:"🛎【レジ呼び出し】お客様がレジにいます"
})
});

document.getElementById("message").style.display="block";

setTimeout(function(){
cooldown=false;
btn.classList.remove("disabled");
document.getElementById("message").style.display="none";
},30000);

}

</script>

</body>
</html>
